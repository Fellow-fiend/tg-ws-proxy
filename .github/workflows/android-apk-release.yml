name: Build Android APK and publish release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v0.1.0). If empty on manual run, APK is built but not released.'
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev lib32stdc++6 lib32z1

      - name: Install Android packages (build-tools include aidl)
        run: |
          yes | sdkmanager --licenses
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-android.txt
          pip install 'setuptools<70'

      - name: Build debug APK
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          BUILDOZER_ALLOW_SDK_LICENSE: "1"
        run: |
          yes | buildozer android debug

      - name: Locate APK
        id: apk
        shell: bash
        run: |
          set -euo pipefail
          APK_PATH="$(ls -1 bin/*.apk | head -n 1)"
          if [[ -z "${APK_PATH}" ]]; then
            echo "No APK generated in bin/"
            exit 1
          fi
          echo "apk_path=${APK_PATH}" >> "$GITHUB_OUTPUT"
          echo "apk_name=$(basename "${APK_PATH}")" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ steps.apk.outputs.apk_path }}
          if-no-files-found: error

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ inputs.release_tag }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Publish APK to GitHub Release
        if: ${{ steps.release.outputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.apk.outputs.apk_path }}
